<!DOCTYPE html>
<html>
<head>
    <title>Prime Number Pyramid</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        pre {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        input, button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        button {
            background: #667eea;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background: #764ba2;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔺 Prime Number Pyramid 🔺</h1>
        <label>Enter number of rows (1-10): </label>
        <input type="number" id="rows" min="1" max="10" value="5">
        <button onclick="generatePyramid()">Generate Pyramid</button>
        <pre id="output"></pre>
    </div>

    <script>
        function isPrime(num) {
            if (num < 2) return false;
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) return false;
            }
            return true;
        }

        function generatePyramid() {
            let rows = parseInt(document.getElementById('rows').value);
            let output = '';
            
            // Generate prime numbers
            let primes = [];
            let num = 2;
            let totalNeeded = rows * (rows + 1) / 2;
            
            while (primes.length < totalNeeded) {
                if (isPrime(num)) {
                    primes.push(num);
                }
                num++;
            }
            
            // Generate pyramid
            let primeIndex = 0;
            for (let row = 1; row <= rows; row++) {
                // Add spaces
                for (let space = 1; space <= rows - row; space++) {
                    output += "   ";
                }
                // Add numbers
                for (let col = 1; col <= row; col++) {
                    output += primes[primeIndex] + "  ";
                    primeIndex++;
                }
                output += "\n";
            }
            
            document.getElementById('output').textContent = output;
        }
        
        // Generate on page load
        generatePyramid();
    </script>
</body>
</html>
